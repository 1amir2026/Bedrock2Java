name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

env:
  NODE_VERSION: "22"

# Cancel any older run for the same branch/PR when a new one starts, so a
# stuck or slow job doesn't keep piling up queued runs behind it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # 1. Sanity check on all three OSes: syntax + a dry-run conversion
  # ---------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Syntax-check all source files
        shell: bash
        run: |
          set -e
          for f in $(find bin lib -name "*.js"); do
            node --check "$f"
          done

      - name: Dry-run conversion against the bundled sample add-on
        shell: bash
        run: node test/run-sample.js

  # ---------------------------------------------------------------------
  # 2. Plain, signing-free source package (recommended distribution)
  #    Works on every OS as long as Node.js is installed - no
  #    SmartScreen / Gatekeeper / antivirus issues since nothing is compiled.
  # ---------------------------------------------------------------------
  package-source:
    name: Package source bundle
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Zip source bundle
        run: |
          mkdir -p dist
          zip -r dist/bedrock2java-cli-source.zip . \
            -x ".git/*" -x ".github/*" -x "dist/*" -x "test/output/*"
      - uses: actions/upload-artifact@v4
        with:
          name: bedrock2java-cli-source
          path: dist/bedrock2java-cli-source.zip

  # ---------------------------------------------------------------------
  # 3. Standalone single-file executables (Node.js Single Executable
  #    Application / SEA) - no Node install required to run these.
  #    These are UNSIGNED. See RELEASE_README.md for what that means
  #    on Windows/macOS and how to safely run them anyway.
  #
  #    IMPORTANT: always use "macos-latest" (currently Apple Silicon) here,
  #    never a pinned label like "macos-13". GitHub has been shrinking the
  #    older Intel macOS runner pools, and a job requesting a shrinking/
  #    retired pool can sit in "Waiting for a runner to pick up this job..."
  #    indefinitely instead of failing - which is exactly what breaks a
  #    tag-triggered release. "macos-latest" always points at a
  #    well-provisioned, fast-queue pool.
  # ---------------------------------------------------------------------
  package-binaries:
    name: Package binary (${{ matrix.name }})
    needs: test
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            artifact: bedrock2java-windows-x64.exe
          - os: ubuntu-latest
            name: linux-x64
            artifact: bedrock2java-linux-x64
          - os: macos-latest      # Apple Silicon runner - fast queue. Do NOT change to macos-13.
            name: macos-arm64
            artifact: bedrock2java-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Copy Node binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: node -e "require('fs').copyFileSync(process.execPath, '${{ matrix.artifact }}')"

      - name: Copy Node binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          NODE_BIN=$(command -v node)
          cp "$NODE_BIN" "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"

      - name: Remove existing signature (macOS)
        if: runner.os == 'macOS'
        run: codesign --remove-signature "${{ matrix.artifact }}"

      - name: Inject SEA blob (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npx --yes postject "${{ matrix.artifact }}" NODE_SEA_BLOB sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 `
            --overwrite

      - name: Inject SEA blob (Linux)
        if: runner.os == 'Linux'
        run: |
          npx --yes postject "${{ matrix.artifact }}" NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Inject SEA blob (macOS)
        if: runner.os == 'macOS'
        run: |
          npx --yes postject "${{ matrix.artifact }}" NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
            --macho-segment-name NODE_SEA

      - name: Ad-hoc re-sign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - "${{ matrix.artifact }}"

      - name: Smoke test the binary
        shell: bash
        run: |
          chmod +x "${{ matrix.artifact }}" || true
          # Non-interactive smoke test: --version/--help-style exit, just confirm it launches.
          ./"${{ matrix.artifact }}" --selftest || true

      - name: Generate checksum
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "${{ matrix.artifact }}" SHA256 | sed -n '2p' > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # ---------------------------------------------------------------------
  # 4. On a version tag (v1.0.0, v1.1.0, ...): publish everything as a
  #    GitHub Release, with RELEASE_README.md as the release body.
  # ---------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-source, package-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_README.md
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
